<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Profile – Campus Bites</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .profile-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    .profile-bg {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 700px 500px at 20% 20%, rgba(255,107,53,0.07), transparent),
        radial-gradient(ellipse 500px 400px at 80% 80%, rgba(139,92,246,0.07), transparent);
    }
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 44px;
      width: 100%; max-width: 520px;
      position: relative; z-index: 1;
      animation: fadeInUp 0.5s ease;
    }
    .profile-header { text-align: center; margin-bottom: 36px; }
    .avatar-wrap {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #ff9a5e);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; margin: 0 auto 16px;
      box-shadow: 0 0 30px var(--primary-glow);
    }
    .avatar-img {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; border: 3px solid var(--primary);
      box-shadow: 0 0 30px var(--primary-glow);
    }
    .profile-header h2 { font-size: 1.5rem; font-weight: 700; }
    .profile-header p { color: var(--text-muted); font-size: 0.875rem; margin-top: 6px; }
    .google-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 50px; padding: 5px 14px;
      font-size: 0.78rem; color: var(--text-muted);
      margin-top: 10px;
    }
    .form-grid { display: flex; flex-direction: column; gap: 20px; }
    .dept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .dept-chip {
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer; transition: var(--transition);
      font-size: 0.8rem; font-weight: 500; text-align: center;
      color: var(--text-muted);
    }
    .dept-chip:hover { border-color: var(--primary); color: var(--primary); }
    .dept-chip.selected { border-color: var(--primary); background: var(--primary-glow); color: var(--primary); }
    .year-row { display: flex; gap: 8px; }
    .year-chip {
      flex: 1; padding: 10px 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer;
      font-size: 0.8rem; font-weight: 500; text-align: center;
      color: var(--text-muted); transition: var(--transition);
    }
    .year-chip:hover { border-color: var(--primary); color: var(--primary); }
    .year-chip.selected { border-color: var(--primary); background: var(--primary-glow); color: var(--primary); }
    .save-btn-wrap { margin-top: 8px; }
    .required-note { font-size: 0.75rem; color: var(--text-dim); text-align: center; margin-top: 12px; }

    @media (max-width: 480px) {
      .profile-card { padding: 28px 20px; }
      .dept-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="profile-page">
  <div class="profile-bg"></div>

  <div class="profile-card">
    <div class="profile-header">
      <div id="avatarWrap" class="avatar-wrap">🎓</div>
      <h2>Complete Your Profile</h2>
      <p>We need a few details so your orders are personalized</p>
      <div class="google-badge" id="loggedInBadge">
        <span>🔒</span> <span id="loggedInEmail">Loading...</span>
      </div>
    </div>

    <div class="form-grid">
      <div class="input-group">
        <label class="input-label">Full Name *</label>
        <div class="input-icon-wrap">
          <span class="icon">👤</span>
          <input class="input" type="text" id="studentName" placeholder="e.g. Rahul Kumar" />
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Register Number *</label>
        <div class="input-icon-wrap">
          <span class="icon">🎫</span>
          <input class="input" type="text" id="regNo" placeholder="e.g. 22CS001" />
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Department *</label>
        <div class="dept-grid" id="deptGrid">
          <div class="dept-chip" data-dept="CSE" onclick="selectDept(this)">💻 CSE</div>
          <div class="dept-chip" data-dept="ECE" onclick="selectDept(this)">📡 ECE</div>
          <div class="dept-chip" data-dept="Mech" onclick="selectDept(this)">⚙️ Mech</div>
          <div class="dept-chip" data-dept="Civil" onclick="selectDept(this)">🏗️ Civil</div>
          <div class="dept-chip" data-dept="EEE" onclick="selectDept(this)">⚡ EEE</div>
          <div class="dept-chip" data-dept="IT" onclick="selectDept(this)">🖥️ IT</div>
          <div class="dept-chip" data-dept="BioTech" onclick="selectDept(this)">🧬 BioTech</div>
          <div class="dept-chip" data-dept="Other" onclick="selectDept(this)">🎓 Other</div>
        </div>
        <input class="input" type="text" id="deptCustom" placeholder="Or type your department..." style="margin-top:8px;" oninput="clearDeptChip()" />
      </div>

      <div class="input-group">
        <label class="input-label">Year of Study</label>
        <div class="year-row">
          <div class="year-chip" data-year="1" onclick="selectYear(this)">1st</div>
          <div class="year-chip" data-year="2" onclick="selectYear(this)">2nd</div>
          <div class="year-chip" data-year="3" onclick="selectYear(this)">3rd</div>
          <div class="year-chip" data-year="4" onclick="selectYear(this)">4th</div>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Phone Number (optional)</label>
        <div class="input-icon-wrap">
          <span class="icon">📱</span>
          <input class="input" type="tel" id="phone" placeholder="10-digit mobile number" maxlength="10" />
        </div>
      </div>

      <div class="save-btn-wrap">
        <button class="btn btn-primary btn-full btn-lg" onclick="saveProfile()" id="saveBtn">
          💾 Save & Continue to Menu
        </button>
      </div>
      <p class="required-note">* Required fields</p>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const API = window.location.origin;
  let selectedDept = '';
  let selectedYear = '';

  window.addEventListener('DOMContentLoaded', async () => {
    const user = JSON.parse(localStorage.getItem('campusBitesUser') || 'null');
    if (!user) { window.location.href = 'index.html'; return; }

    document.getElementById('loggedInEmail').textContent = user.email;

    if (user.googlePhoto) {
      const wrap = document.getElementById('avatarWrap');
      wrap.outerHTML = `<img class="avatar-img" src="${user.googlePhoto}" alt="avatar" id="avatarWrap" />`;
    }

    // Pre-fill if existing profile
    try {
      const res = await fetch(`${API}/api/users/${encodeURIComponent(user.email)}`);
      if (res.ok) {
        const p = await res.json();
        if (p.studentName) document.getElementById('studentName').value = p.studentName;
        if (p.regNo) document.getElementById('regNo').value = p.regNo;
        if (p.department) {
          const chip = document.querySelector(`.dept-chip[data-dept="${p.department}"]`);
          if (chip) { selectDept(chip); } else {
            document.getElementById('deptCustom').value = p.department;
            selectedDept = p.department;
          }
        }
        if (p.year) {
          const yc = document.querySelector(`.year-chip[data-year="${p.year}"]`);
          if (yc) selectYear(yc);
        }
        if (p.phone) document.getElementById('phone').value = p.phone;
      }
    } catch {}
  });

  function selectDept(el) {
    document.querySelectorAll('.dept-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedDept = el.dataset.dept;
    document.getElementById('deptCustom').value = '';
  }

  function clearDeptChip() {
    document.querySelectorAll('.dept-chip').forEach(c => c.classList.remove('selected'));
    selectedDept = document.getElementById('deptCustom').value;
  }

  function selectYear(el) {
    document.querySelectorAll('.year-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedYear = el.dataset.year;
  }

  async function saveProfile() {
    const user = JSON.parse(localStorage.getItem('campusBitesUser'));
    const studentName = document.getElementById('studentName').value.trim();
    const regNo = document.getElementById('regNo').value.trim();
    const dept = selectedDept || document.getElementById('deptCustom').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!studentName) { showToast('Please enter your full name.', 'error'); return; }
    if (!regNo) { showToast('Please enter your register number.', 'error'); return; }
    if (!dept) { showToast('Please select or enter your department.', 'error'); return; }

    const btn = document.getElementById('saveBtn');
    btn.textContent = '⏳ Saving...'; btn.disabled = true;

    try {
      const res = await fetch(`${API}/api/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: user.email,
          googleId: user.googleId,
          googleName: user.googleName,
          googlePhoto: user.googlePhoto,
          studentName, regNo, department: dept,
          year: selectedYear, phone
        })
      });
      if (!res.ok) throw new Error();
      showToast('Profile saved! 🎉', 'success');
      setTimeout(() => window.location.href = 'menu.html', 900);
    } catch {
      showToast('Failed to save. Check if server is running.', 'error');
      btn.textContent = '💾 Save & Continue to Menu'; btn.disabled = false;
    }
  }

  function showToast(msg, type = 'info') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = (type==='success'?'✅':type==='error'?'❌':'ℹ️') + ' ' + msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }
</script>
</body>
</html>
