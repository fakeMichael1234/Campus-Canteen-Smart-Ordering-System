<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu – Campus Bites</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { padding-bottom: 90px; }

    /* NAVBAR */
    .menu-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,18,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .menu-nav-top {
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .brand { display:flex; align-items:center; gap:8px; font-size:1.2rem; font-weight:800; text-decoration:none; color:var(--text); }
    .brand span { color: var(--primary); }

    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-user { display:flex; align-items:center; gap:9px; }
    .nav-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #ff9a5e);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: white;
      border: 2px solid var(--primary); cursor: pointer; text-decoration: none;
      flex-shrink: 0;
    }
    .nav-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
    .nav-user-info { text-align: right; }
    .nav-user-name { font-size: 0.85rem; font-weight: 600; }
    .nav-user-dept { font-size: 0.72rem; color: var(--text-muted); }
    .nav-history-btn { display:flex; align-items:center; gap:5px; font-size:0.82rem; color:var(--text-muted); text-decoration:none; transition:var(--transition); }
    .nav-history-btn:hover { color:var(--primary); }
    .nav-logout { background:none; border:none; cursor:pointer; color:var(--text-dim); font-size:1rem; transition:var(--transition); }
    .nav-logout:hover { color:var(--red); }

    /* CONTROLS BAR */
    .controls-bar {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 0;
      flex-wrap: wrap;
    }
    .controls-bar .search-bar { flex: 1; min-width: 200px; }

    /* VEG TOGGLE */
    .veg-toggle-wrap {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px; padding: 8px 16px;
      cursor: pointer; transition: var(--transition);
      white-space: nowrap;
    }
    .veg-toggle-wrap.active { border-color: var(--green); background: var(--green-glow); }

    /* CATEGORY TABS */
    .cat-tabs-wrap { padding: 0 24px 12px; }

    /* MENU GRID */
    .menu-section { padding: 0 24px; }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 16px;
    }

    /* MENU CARD */
    .menu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex; flex-direction: column;
      transition: var(--transition);
      position: relative; overflow: hidden;
    }
    .menu-card:hover { border-color: var(--border-hover); transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

    .food-card-veg-badge {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      padding: 4px; border-radius: 4px;
      z-index: 2;
    }

    .food-info { padding: 0; margin-top: 10px; }
    .food-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .food-name {
      font-size: 1.05rem; font-weight: 700;
    }
    .food-price { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
    .food-category { font-size: 0.65rem; color: var(--text-dim); background: var(--surface3); padding: 2px 8px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* QTY CONTROL IN CARD */
    .qty-area { margin-top: 12px; }

    /* QTY CONTROL */
    .qty-control { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .qty-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 1.1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
      font-family: 'Poppins', sans-serif;
    }
    .qty-btn.minus { background: var(--surface3); color: var(--text); }
    .qty-btn.minus:hover { background: var(--red); color: white; }
    .qty-btn.plus { background: var(--primary); color: white; }
    .qty-btn.plus:hover { background: var(--primary-dark); }
    .qty-num { font-size: 1rem; font-weight: 700; min-width: 20px; text-align: center; }

    .add-btn {
      background: none;
      border: 2px solid var(--primary);
      color: var(--primary);
      border-radius: 50px;
      padding: 7px 18px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: var(--transition);
      flex-shrink: 0;
    }
    .add-btn:hover { background: var(--primary); color: white; }

    /* SECTION HEADER */
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 4px; padding-top: 24px;
    }
    .section-header h3 { font-size: 1.1rem; font-weight: 700; }
    .section-header .count { color: var(--text-muted); font-size: 0.85rem; }
    .section-divider { height: 2px; background: linear-gradient(to right, var(--primary), transparent); border-radius: 1px; margin-bottom: 16px; }

    /* NO RESULTS */
    .no-results {
      grid-column: 1 / -1;
      text-align: center; padding: 60px; color: var(--text-muted);
    }
    .no-results .nr-icon { font-size: 3rem; margin-bottom: 12px; }

    @media (max-width: 768px) {
      .menu-nav { padding: 0 16px; }
      .menu-section { padding: 0 16px; }
      .cat-tabs-wrap { padding: 0 16px 12px; }
      .menu-grid { grid-template-columns: 1fr; gap: 12px; }
      .nav-user-info { display: none; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="menu-nav">
  <div class="menu-nav-top">
    <a class="brand" href="menu.html">🍽️ Campus<span>Bites</span></a>
      <a class="nav-history-btn" href="cart.html" id="navCartBtn" style="display:none;">🛒 <span id="navCartCount">0</span></a>
      <a class="nav-history-btn" href="history.html">📋 Orders</a>
      <div class="nav-user">
        <div class="nav-user-info">
          <div class="nav-user-name" id="navNameDisplay">Loading...</div>
          <div class="nav-user-dept" id="navDeptDisplay"></div>
        </div>
        <a class="nav-avatar" href="profile.html" id="navAvatarLink" title="Edit Profile">
          <span id="navAvatarInitial">?</span>
        </a>
      </div>
      <button class="nav-logout" onclick="logout()" title="Logout">🚪</button>
    </div>
  </div>

  <!-- CONTROLS BAR -->
  <div class="controls-bar">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search dishes..." oninput="renderMenu()" />
    </div>
    <label class="veg-toggle-wrap" id="vegToggleWrap" onclick="toggleVeg()">
      <div class="veg-dot veg"></div>
      <span class="toggle-label" id="vegLabel">Veg Only</span>
      <input type="checkbox" id="vegToggle" style="display:none" />
    </label>
  </div>
</nav>

<!-- CATEGORY TABS -->
<div class="cat-tabs-wrap">
  <div class="tabs" id="catTabs">
    <button class="tab-btn active" data-cat="All" onclick="selectCat(this)">🍽️ All</button>
    <button class="tab-btn" data-cat="Rice" onclick="selectCat(this)">🍚 Rice</button>
    <button class="tab-btn" data-cat="Biriyani" onclick="selectCat(this)">🍲 Biriyani</button>
    <button class="tab-btn" data-cat="Noodles" onclick="selectCat(this)">🍜 Noodles</button>
    <button class="tab-btn" data-cat="Snacks" onclick="selectCat(this)">🥦 Snacks</button>
    <button class="tab-btn" data-cat="Special" onclick="selectCat(this)">🥙 Special</button>
    <button class="tab-btn" data-cat="Grill" onclick="selectCat(this)">🍖 Grill</button>
  </div>
</div>

<!-- MENU GRID -->
<div class="menu-section" id="menuSection">
  <div class="loading-screen">
    <div class="spinner"></div>
    <p>Loading menu...</p>
  </div>
</div>

<!-- BOTTOM CHECKOUT BAR -->
<div class="cart-bottom-bar" id="cartBarContainer" style="display:none;">
    <div class="cart-summary-text">
      <span id="cartCountPill">0</span> items | ₹<span id="cartTotalPill">0.00</span>
    </div>
    <a href="cart.html" class="btn btn-primary" id="cartBarPill">View Cart →</a>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const API = '';
  let allMenuItems = [];
  let cart = {};
  let vegOnly = false;
  let selectedCategory = 'All';
  let userProfile = null;

  window.addEventListener('DOMContentLoaded', async () => {
    // Auth check
    const user = JSON.parse(localStorage.getItem('campusBitesUser') || 'null');
    if (!user) { window.location.href = 'index.html'; return; }

    // Load cart from localStorage
    cart = JSON.parse(localStorage.getItem('campusBitesCart') || '{}');

    // Load user profile
    try {
      const res = await fetch(`${API}/api/users/${encodeURIComponent(user.email)}`);
      if (res.ok) {
        userProfile = await res.json();
        if (!userProfile.studentName) { window.location.href = 'profile.html'; return; }
        setNavUser(userProfile, user);
      } else {
        // Continue but with default
        const name = user.googleName || 'Student';
        document.getElementById('navNameDisplay').textContent = name;
      }
    } catch {
      const name = user.googleName || 'Student';
      document.getElementById('navNameDisplay').textContent = name;
    }

    // Load menu
    try {
      const res = await fetch(`${API}/api/menu`);
      allMenuItems = await res.json();
    } catch {
      showToast('Could not load menu. Is the server running?', 'error');
      allMenuItems = [];
    }

    renderMenu();
    updateCartBar();
  });

  function setNavUser(profile, user) {
    document.getElementById('navNameDisplay').textContent = profile.studentName || user.googleName;
    document.getElementById('navDeptDisplay').textContent = `${profile.department || ''} ${profile.year ? '· ' + profile.year + ' Year' : ''}`;
    const init = (profile.studentName || user.googleName || 'S')[0].toUpperCase();
    if (user.googlePhoto) {
      document.getElementById('navAvatarLink').innerHTML = `<img src="${user.googlePhoto}" alt="avatar" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />`;
    } else {
      document.getElementById('navAvatarInitial').textContent = init;
    }
  }

  function toggleVeg() {
    vegOnly = !vegOnly;
    const wrap = document.getElementById('vegToggleWrap');
    const label = document.getElementById('vegLabel');
    if (vegOnly) {
      wrap.classList.add('active');
      label.textContent = '🟢 Veg Only';
    } else {
      wrap.classList.remove('active');
      label.textContent = 'Veg Only';
    }
    renderMenu();
  }

  function selectCat(el) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedCategory = el.dataset.cat;
    renderMenu();
  }

  function renderMenu() {
    const section = document.getElementById('menuSection');
    const search = document.getElementById('searchInput').value.trim().toLowerCase();

    let items = allMenuItems.filter(item => {
      if (vegOnly && !item.veg) return false;
      if (selectedCategory !== 'All' && item.category !== selectedCategory) return false;
      if (search && !item.name.toLowerCase().includes(search)) return false;
      return true;
    });

    if (items.length === 0) {
      section.innerHTML = `
        <div class="no-results">
          <div class="nr-icon">🔍</div>
          <p>No dishes found. Try a different filter.</p>
        </div>`;
      return;
    }

    // Group by veg/non-veg if showing all
    const vegItems = items.filter(i => i.veg);
    const nonVegItems = items.filter(i => !i.veg);

    let html = '';

    if (vegItems.length > 0) {
      html += `
        <div class="section-header">
          <div class="veg-dot veg"></div>
          <h3>Veg</h3>
          <span class="count">${vegItems.length} items</span>
        </div>
        <div class="section-divider"></div>
        <div class="menu-grid">
          ${vegItems.map(i => menuCardHTML(i)).join('')}
        </div>`;
    }

    if (!vegOnly && nonVegItems.length > 0) {
      html += `
        <div class="section-header" style="margin-top:${vegItems.length>0?'32px':'0'}">
          <div class="veg-dot nonveg"></div>
          <h3>Non-Veg</h3>
          <span class="count">${nonVegItems.length} items</span>
        </div>
        <div class="section-divider" style="background:linear-gradient(to right,var(--red),transparent)"></div>
        <div class="menu-grid">
          ${nonVegItems.map(i => menuCardHTML(i)).join('')}
        </div>`;
    }

    section.innerHTML = html;
    updateAllQtyControls();
  }

  function menuCardHTML(item) {
    const qty = cart[item.id] || 0;
    const vegClass = item.veg ? 'veg' : 'non-veg';
    const html = `
      <div class="menu-card card ${vegClass}" data-id="${item.id}" data-category="${item.category}" data-veg="${item.veg}">
        <div class="food-card-veg-badge">
          <span class="veg-dot ${item.veg ? 'veg' : 'non-veg'}"></span>
        </div>
        
        <div class="food-info">
          <div class="food-header">
            <h3 class="food-name">${item.emoji} ${item.name}</h3>
            <span class="food-price">₹${item.price.toFixed(2)}</span>
          </div>
          <p class="food-category">${item.category}</p>
          
          <div class="food-actions">
            ${qty > 0 ? `
              <div class="qty-control">
                <button class="qty-btn" onclick="updateCart(${item.id}, -1)">-</button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn" onclick="updateCart(${item.id}, 1)">+</button>
              </div>
            ` : `
              <button class="btn btn-outline btn-sm btn-full" onclick="updateCart(${item.id}, 1)">
                Add to Cart
              </button>
            `}
          </div>
        </div>
      </div>`;
    return html;
  }

  function updateCart(id, change) {
    const currentQty = cart[id] || 0;
    const newQty = currentQty + change;
    
    if (newQty <= 0) {
      delete cart[id];
    } else {
      cart[id] = newQty;
    }

    saveCart();
    renderMenu(); // Re-render the relevant items
    updateCartBar();
    
    // Animations
    const pill = document.getElementById('cartBarPill');
    if (pill) {
      pill.classList.remove('pop-out');
      void pill.offsetWidth; // trigger reflow
      pill.classList.add('pop-out');
    }

    if (change > 0 && newQty === 1) {
      const item = allMenuItems.find(i => i.id === id);
      showToast(`${item.emoji} Added to cart`, 'success');
    }
  }

  function saveCart() { localStorage.setItem('campusBitesCart', JSON.stringify(cart)); }

  function updateCartBar() {
    try {
      const container = document.getElementById('cartBarContainer');
      const navCartBtn = document.getElementById('navCartBtn');
      const totalItems = Object.values(cart).reduce((s,q) => s + (Number(q) || 0), 0);
      
      if (!totalItems || totalItems <= 0) { 
        if (container) container.style.display = 'none'; 
        if (navCartBtn) navCartBtn.style.display = 'none';
        return; 
      }
      
      // Update Bottom Bar
      if (container) {
        container.style.display = 'flex';
        const countEl = document.getElementById('cartCountPill');
        const totalEl = document.getElementById('cartTotalPill');
        
        if (countEl) countEl.textContent = totalItems;
        
        if (totalEl) {
          const total = Object.entries(cart).reduce((s, [id, qty]) => {
            const item = allMenuItems.find(i => String(i.id) === String(id));
            return s + (item ? item.price * qty : 0);
          }, 0);
          totalEl.textContent = total.toFixed(2);
        }
      }
      
      // Update Navbar Icon
      if (navCartBtn) {
        navCartBtn.style.display = 'flex';
        const navCount = document.getElementById('navCartCount');
        if (navCount) navCount.textContent = totalItems;
      }
    } catch (err) {
      console.error("Cart update error:", err);
    }
  }

  function logout() {
    localStorage.removeItem('campusBitesUser');
    localStorage.removeItem('campusBitesCart');
    window.location.href = 'index.html';
  }

  function showToast(msg, type='info') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }
</script>
</body>
</html>
