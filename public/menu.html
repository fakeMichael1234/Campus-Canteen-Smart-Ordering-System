<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Menu – Campus Bites</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{padding-bottom:90px;}

    /* NAV */
    .main-nav{
      position:sticky;top:0;z-index:200;
      background:rgba(10,10,15,0.88);
      backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
      transition:background 0.3s,box-shadow 0.3s;
    }
    body.light-mode .main-nav{background:rgba(247,245,240,0.9);}
    .main-nav.scrolled{box-shadow:0 4px 32px rgba(0,0,0,0.5);}
    .nav-inner{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;height:66px;
    }
    .nav-right{display:flex;align-items:center;gap:10px;}
    .nav-user-info{text-align:right;}
    .nav-user-name{font-size:0.83rem;font-weight:700;}
    .nav-user-dept{font-size:0.7rem;color:var(--text-muted);}
    @media(max-width:600px){.nav-user-info{display:none;}}

    /* CONTROLS */
    .controls-bar{
      padding:12px 24px;
      display:flex;align-items:center;gap:12px;flex-wrap:wrap;
      background:rgba(10,10,15,0.88);
      backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
    }
    body.light-mode .controls-bar{background:rgba(247,245,240,0.9);}
    .controls-bar .search-bar{flex:1;min-width:200px;}

    .veg-toggle-wrap{
      display:flex;align-items:center;gap:8px;
      background:var(--surface2);border:1.5px solid var(--border);
      border-radius:50px;padding:8px 16px;
      cursor:pointer;transition:var(--transition);
      white-space:nowrap;font-weight:600;font-size:0.83rem;
    }
    .veg-toggle-wrap.active{border-color:var(--green);background:var(--green-glow);color:var(--green);}

    /* CATEGORY TABS */
    .cat-tabs-wrap{padding:12px 24px 4px;}

    /* MENU GRID */
    .menu-section{padding:16px 24px;}
    .menu-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:16px;margin-top:14px;
    }

    /* SECTION HEADER */
    .section-header{
      display:flex;align-items:center;gap:10px;
      margin-bottom:4px;padding-top:24px;
    }
    .section-header h3{font-size:1rem;font-weight:800;letter-spacing:-0.02em;}
    .section-header .count{color:var(--text-muted);font-size:0.8rem;font-weight:600;}
    .section-divider{height:2px;background:linear-gradient(to right,var(--primary),transparent);border-radius:2px;margin-bottom:12px;}

    /* MENU CARD */
    .menu-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius-lg);padding:18px;
      display:flex;flex-direction:column;
      transition:var(--transition);
      position:relative;overflow:hidden;
      animation:fadeInUp 0.4s ease both;
    }
    .menu-card::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--primary),var(--orange2));
      transform:scaleX(0);transform-origin:left;
      transition:transform 0.3s ease;
    }
    .menu-card:hover{border-color:rgba(255,107,53,0.3);transform:translateY(-5px);box-shadow:0 16px 48px rgba(255,107,53,0.1);}
    .menu-card:hover::after{transform:scaleX(1);}

    .food-card-veg-badge{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);padding:4px;border-radius:4px;z-index:2;}

    .food-emoji-big{font-size:2.8rem;margin-bottom:10px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));}

    .food-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:8px;}
    .food-name{font-size:0.95rem;font-weight:800;letter-spacing:-0.02em;line-height:1.2;}
    .food-price{font-size:1.05rem;font-weight:900;color:var(--primary);white-space:nowrap;}
    .food-category{font-size:0.62rem;color:var(--text-dim);background:var(--surface3);padding:2px 8px;border-radius:50px;text-transform:uppercase;letter-spacing:0.06em;font-weight:700;display:inline-block;margin-bottom:10px;}

    .add-btn-wrap{margin-top:auto;}

    /* NO RESULTS */
    .no-results{grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted);}
    .no-results .nr-icon{font-size:3rem;margin-bottom:12px;}

    @media(max-width:768px){
      .nav-inner,.controls-bar,.cat-tabs-wrap,.menu-section{padding-left:16px;padding-right:16px;}
      .menu-grid{grid-template-columns:1fr;gap:12px;}
    }
  </style>
</head>
<body>

<nav class="main-nav" id="mainNav">
  <div class="nav-inner">
    <a class="navbar-brand" href="dashboard.html">
      <div class="brand-icon">🍽️</div>
      Campus<span class="accent">Bites</span>
    </a>
    <div class="nav-right">
      <a href="dashboard.html" class="nav-link">🏠 Home</a>
      <a href="history.html" class="nav-link">📋 Orders</a>
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="nav-user-info">
          <div class="nav-user-name" id="navName">Loading…</div>
          <div class="nav-user-dept" id="navDept"></div>
        </div>
        <a href="profile.html" class="nav-avatar" id="navAvatar">?</a>
      </div>
      <button onclick="logout()" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text-muted);" title="Logout" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='var(--text-muted)'">🚪</button>
    </div>
  </div>
  <div class="controls-bar">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search dishes…" oninput="renderMenu()"/>
    </div>
    <label class="veg-toggle-wrap" id="vegToggleWrap" onclick="toggleVeg()">
      <div class="veg-dot veg"></div>
      <span id="vegLabel">Veg Only</span>
      <input type="checkbox" id="vegToggle" style="display:none"/>
    </label>
  </div>
</nav>

<div class="cat-tabs-wrap">
  <div class="tabs" id="catTabs">
    <button class="tab-btn active" data-cat="All" onclick="selectCat(this)">🍽️ All</button>
    <button class="tab-btn" data-cat="Rice" onclick="selectCat(this)">🍚 Rice</button>
    <button class="tab-btn" data-cat="Biriyani" onclick="selectCat(this)">🍲 Biriyani</button>
    <button class="tab-btn" data-cat="Noodles" onclick="selectCat(this)">🍜 Noodles</button>
    <button class="tab-btn" data-cat="Snacks" onclick="selectCat(this)">🥨 Snacks</button>
    <button class="tab-btn" data-cat="Special" onclick="selectCat(this)">⭐ Special</button>
    <button class="tab-btn" data-cat="Grill" onclick="selectCat(this)">🍖 Grill</button>
  </div>
</div>

<div class="menu-section" id="menuSection">
  <div class="loading-screen"><div class="spinner"></div><p>Loading menu…</p></div>
</div>

<div id="cartBarContainer">
  <div class="cb-left">🛒 <span id="cartCountPill">0</span> items</div>
  <a href="cart.html" class="cb-btn">View Cart & Pay →</a>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const API='';
  let allMenuItems=[],cart={},vegOnly=false,selectedCategory='All';

  function applyTheme(m){
    document.body.classList.toggle('light-mode',m==='light');
    document.getElementById('themeBtn').textContent=m==='light'?'🌙':'☀️';
    localStorage.setItem('cbTheme',m);
  }
  function toggleTheme(){applyTheme((localStorage.getItem('cbTheme')||'dark')==='dark'?'light':'dark');}
  applyTheme(localStorage.getItem('cbTheme')||'dark');

  window.addEventListener('scroll',()=>{
    document.getElementById('mainNav').classList.toggle('scrolled',window.scrollY>10);
  },{passive:true});

  window.addEventListener('DOMContentLoaded',async()=>{
    let user=JSON.parse(localStorage.getItem('campusBitesUser')||'null');
    if(!user){window.location.href='index.html';return;}

    cart=JSON.parse(localStorage.getItem('campusBitesCart')||'{}');
    setNavUser(user);

    try{
      const r=await fetch(`${API}/api/users/${encodeURIComponent(user.email.toLowerCase())}`,{cache:'no-store'});
      if(r.ok){
        const fp=await r.json();
        user={...user,...fp};
        localStorage.setItem('campusBitesUser',JSON.stringify(user));
        if(Object.keys(cart).length===0&&fp.cart){
          cart=fp.cart;
          localStorage.setItem('campusBitesCart',JSON.stringify(cart));
        }
        if(!fp.studentName){window.location.href='profile.html';return;}
        setNavUser(user);
      }
    }catch(e){
      if(!user.studentName){window.location.href='profile.html';return;}
    }

    try{
      const r=await fetch(`${API}/api/menu`);
      allMenuItems=await r.json();
    }catch{showToast('Could not load menu','error');allMenuItems=[];}

    renderMenu();
    updateCartBar();
  });

  function setNavUser(u){
    document.getElementById('navName').textContent=u.studentName||u.googleName||'Student';
    document.getElementById('navDept').textContent=(u.department||'')+(u.year?' · '+u.year+' Yr':'');
    const av=document.getElementById('navAvatar');
    if(u.googlePhoto)av.innerHTML=`<img src="${u.googlePhoto}" alt=""/>`;
    else av.textContent=(u.studentName||u.googleName||'S')[0].toUpperCase();
  }

  function toggleVeg(){
    vegOnly=!vegOnly;
    document.getElementById('vegToggleWrap').classList.toggle('active',vegOnly);
    document.getElementById('vegLabel').textContent=vegOnly?'🟢 Veg Only':'Veg Only';
    renderMenu();
  }

  function selectCat(el){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    selectedCategory=el.dataset.cat;
    renderMenu();
  }

  function renderMenu(){
    const section=document.getElementById('menuSection');
    const search=document.getElementById('searchInput').value.trim().toLowerCase();
    let items=allMenuItems.filter(item=>{
      if(vegOnly&&!item.veg)return false;
      if(selectedCategory!=='All'&&item.category!==selectedCategory)return false;
      if(search&&!item.name.toLowerCase().includes(search))return false;
      return true;
    });

    if(items.length===0){
      section.innerHTML=`<div class="no-results"><div class="nr-icon">🔍</div><p>No dishes found. Try a different filter.</p></div>`;
      return;
    }

    const veg=items.filter(i=>i.veg);
    const nv=items.filter(i=>!i.veg);
    let html='';

    if(veg.length>0){
      html+=`<div class="section-header"><div class="veg-dot veg"></div><h3>Veg</h3><span class="count">${veg.length} items</span></div><div class="section-divider"></div><div class="menu-grid">${veg.map((i,idx)=>cardHTML(i,idx)).join('')}</div>`;
    }
    if(!vegOnly&&nv.length>0){
      html+=`<div class="section-header" style="margin-top:${veg.length>0?'28px':'0'}"><div class="veg-dot nonveg"></div><h3>Non-Veg</h3><span class="count">${nv.length} items</span></div><div class="section-divider" style="background:linear-gradient(to right,var(--red),transparent)"></div><div class="menu-grid">${nv.map((i,idx)=>cardHTML(i,veg.length+idx)).join('')}</div>`;
    }
    section.innerHTML=html;
  }

  function cardHTML(item,idx){
    const qty=cart[item.id]||0;
    const delay=Math.min(idx*0.04,0.5);
    return `
      <div class="menu-card" style="animation-delay:${delay}s">
        <div class="food-card-veg-badge"><span class="veg-dot ${item.veg?'veg':'nonveg'}"></span></div>
        <div class="food-emoji-big">${item.emoji}</div>
        <div class="food-header">
          <h3 class="food-name">${item.name}</h3>
          <span class="food-price">₹${item.price.toFixed(0)}</span>
        </div>
        <span class="food-category">${item.category}</span>
        <div class="food-actions add-btn-wrap">
          ${qty>0?`
            <div class="qty-control">
              <button class="qty-btn minus btn" onclick="updateCart(${item.id},-1)">−</button>
              <span class="qty-num">${qty}</span>
              <button class="qty-btn plus btn" onclick="updateCart(${item.id},1)">+</button>
            </div>`:`
            <button class="add-btn btn btn-full" onclick="updateCart(${item.id},1)">+ Add to Cart</button>`}
        </div>
      </div>`;
  }

  function updateCart(id,change){
    const nq=(cart[id]||0)+change;
    if(nq<=0)delete cart[id];else cart[id]=nq;
    saveCart();renderMenu();updateCartBar();
    if(change>0&&nq===1){
      const it=allMenuItems.find(i=>i.id===id);
      if(it){showToast(`${it.emoji} ${it.name} added!`,'success');syncSession({activity:{type:'CART_ADD',detail:'Added '+it.name}});}
    }
  }

  function saveCart(){
    localStorage.setItem('campusBitesCart',JSON.stringify(cart));
    syncSession({cart});
  }

  function syncSession(data){
    const u=JSON.parse(localStorage.getItem('campusBitesUser'));
    if(!u)return;
    fetch(`${API}/api/users`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:u.email.toLowerCase(),...data})}).catch(()=>{});
  }

  function updateCartBar(){
    const bar=document.getElementById('cartBarContainer');
    const total=Object.values(cart).reduce((s,q)=>s+(Number(q)||0),0);
    bar.style.display=total>0?'flex':'none';
    document.getElementById('cartCountPill').textContent=total;
  }

  function logout(){
    localStorage.removeItem('campusBitesUser');
    localStorage.removeItem('campusBitesCart');
    window.location.href='index.html';
  }

  function showToast(msg,type='info'){
    const c=document.getElementById('toastContainer');
    const t=document.createElement('div');
    t.className=`toast ${type}`;t.textContent=msg;
    c.appendChild(t);setTimeout(()=>t.remove(),2500);
  }

  document.addEventListener('click',function(e){
    const btn=e.target.closest('.btn,.add-btn');
    if(!btn)return;
    const r=document.createElement('span');
    r.className='ripple';
    const rc=btn.getBoundingClientRect();
    const sz=Math.max(rc.width,rc.height);
    r.style.width=r.style.height=sz+'px';
    r.style.left=(e.clientX-rc.left-sz/2)+'px';
    r.style.top=(e.clientY-rc.top-sz/2)+'px';
    btn.appendChild(r);setTimeout(()=>r.remove(),600);
  });
</script>
</body>
</html>
