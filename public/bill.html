<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>E-Bill – Campus Bites</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body{padding-bottom:40px;}
    .bill-page{max-width:640px;margin:0 auto;padding:28px 24px;}

    .bill-card-outer{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius-xl);overflow:hidden;
      animation:scaleIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
    }

    /* TOP RECEIPT HEADER */
    .bill-top{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      padding:28px;text-align:center;color:#fff;
      position:relative;overflow:hidden;
    }
    .bill-top::before{
      content:'';position:absolute;inset:0;
      background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .bill-logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;position:relative;}
    .bill-logo-icon{font-size:2rem;}
    .bill-logo-text{font-size:1.4rem;font-weight:900;letter-spacing:-0.03em;}
    .bill-title{font-size:0.8rem;font-weight:600;opacity:0.75;letter-spacing:0.08em;text-transform:uppercase;position:relative;}

    /* ZIGZAG DIVIDER */
    .zigzag{
      height:20px;background:var(--surface);
      clip-path:polygon(0 0,2.5% 100%,5% 0,7.5% 100%,10% 0,12.5% 100%,15% 0,17.5% 100%,20% 0,22.5% 100%,25% 0,27.5% 100%,30% 0,32.5% 100%,35% 0,37.5% 100%,40% 0,42.5% 100%,45% 0,47.5% 100%,50% 0,52.5% 100%,55% 0,57.5% 100%,60% 0,62.5% 100%,65% 0,67.5% 100%,70% 0,72.5% 100%,75% 0,77.5% 100%,80% 0,82.5% 100%,85% 0,87.5% 100%,90% 0,92.5% 100%,95% 0,97.5% 100%,100% 0,100% 100%,0 100%);
    }

    /* BILL BODY */
    .bill-body{padding:24px;}

    /* ORDER ID ROW */
    .order-id-row{
      text-align:center;margin-bottom:20px;
      padding-bottom:20px;border-bottom:2px dashed var(--border);
    }
    .order-id-label{font-size:0.7rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;}
    .order-id-val{font-size:1.2rem;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--primary);}
    .order-date-val{font-size:0.78rem;color:var(--text-muted);margin-top:4px;}

    /* STUDENT INFO */
    .bill-student{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
      padding:14px;background:var(--surface2);border-radius:var(--radius);
      margin-bottom:18px;
    }
    .bs-cell .bsk{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);margin-bottom:2px;}
    .bs-cell .bsv{font-size:0.85rem;font-weight:700;}

    /* ITEMS TABLE */
    .items-title{font-size:0.8rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
    .items-table{width:100%;border-collapse:collapse;margin-bottom:16px;}
    .items-table th{font-size:0.68rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;padding:6px 0;border-bottom:1px solid var(--border);text-align:left;}
    .items-table th:last-child,.items-table td:last-child{text-align:right;}
    .items-table td{padding:10px 0;font-size:0.875rem;border-bottom:1px solid rgba(255,255,255,0.04);}
    .items-table tr:last-child td{border-bottom:none;}
    .it-name{font-weight:700;}
    .it-sub{font-size:0.72rem;color:var(--text-muted);}
    .it-price{font-weight:700;color:var(--primary);font-family:'JetBrains Mono',monospace;}

    /* TOTALS */
    .bill-totals{
      background:var(--surface2);border-radius:var(--radius);
      padding:14px;margin-bottom:16px;
    }
    .bt-row{display:flex;justify-content:space-between;font-size:0.85rem;padding:5px 0;color:var(--text-muted);}
    .bt-row.grand{font-size:1rem;font-weight:900;color:var(--text);padding-top:10px;border-top:1px solid var(--border);margin-top:5px;}
    .bt-row.grand .ba{color:var(--primary);font-family:'JetBrains Mono',monospace;font-size:1.1rem;}

    /* PAYMENT INFO */
    .pay-info{
      display:flex;align-items:center;gap:10px;
      padding:12px;background:var(--green-glow);border:1px solid rgba(34,197,94,0.2);
      border-radius:var(--radius-sm);margin-bottom:16px;font-size:0.82rem;
    }
    .pay-info strong{color:var(--green);}

    /* QR */
    .qr-section{
      text-align:center;padding:20px;
      border-top:2px dashed var(--border);margin-top:4px;
    }
    .qr-label{font-size:0.75rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;}
    .qr-wrap{background:#fff;padding:14px;border-radius:var(--radius);display:inline-block;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
    .qr-note{font-size:0.72rem;color:var(--text-dim);margin-top:10px;}

    /* ACTIONS */
    .bill-actions{display:flex;gap:10px;padding:20px 24px;border-top:1px solid var(--border);flex-wrap:wrap;}
    @media(max-width:480px){.bill-actions{flex-direction:column;}}

    /* FOOTER */
    .bill-footer{
      text-align:center;padding:16px;
      font-size:0.72rem;color:var(--text-dim);
      border-top:1px solid var(--border);
      line-height:1.8;
    }

    @media(max-width:600px){.bill-page{padding:16px;}.bill-student{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="dashboard.html">
    <div class="brand-icon">🍽️</div>
    Campus<span>Bites</span>
  </a>
  <div class="navbar-actions">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <a href="history.html" class="btn btn-ghost btn-sm">📋 History</a>
  </div>
</nav>

<div class="bill-page">
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px;animation:fadeInUp 0.4s ease;">
    <a href="history.html" class="back-btn">←</a>
    <div>
      <h1 class="page-title">🧾 E-<span>Bill</span></h1>
      <p class="page-subtitle">Digital receipt for your order</p>
    </div>
  </div>

  <div id="billContent"><div class="loading-screen"><div class="spinner"></div><p>Loading receipt…</p></div></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  function applyTheme(m){
    document.body.classList.toggle('light-mode',m==='light');
    document.getElementById('themeBtn').textContent=m==='light'?'🌙':'☀️';
    localStorage.setItem('cbTheme',m);
  }
  function toggleTheme(){applyTheme((localStorage.getItem('cbTheme')||'dark')==='dark'?'light':'dark');}
  applyTheme(localStorage.getItem('cbTheme')||'dark');

  window.addEventListener('DOMContentLoaded',()=>{
    const order=JSON.parse(localStorage.getItem('campusBitesCurrentOrder')||'null');
    if(!order){
      document.getElementById('billContent').innerHTML=`
        <div class="empty-state">
          <div class="empty-icon">🧾</div>
          <h3>No bill found</h3>
          <p>View your orders to access bills</p>
          <a href="history.html" class="btn btn-primary" style="margin-top:16px;">Go to History</a>
        </div>`;
      return;
    }
    renderBill(order);
  });

  function renderBill(order){
    const d=new Date(order.createdAt);
    const dateStr=d.toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'});
    const timeStr=d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    const totalQty=order.items.reduce((s,i)=>s+i.qty,0);
    const statusMap={Confirmed:'status-confirmed',Preparing:'status-preparing',Ready:'status-ready',Completed:'status-confirmed',Cancelled:'status-cancelled'};

    document.getElementById('billContent').innerHTML=`
      <div class="bill-card-outer">
        <!-- TOP -->
        <div class="bill-top">
          <div class="bill-logo-row">
            <span class="bill-logo-icon">🍽️</span>
            <span class="bill-logo-text">Campus Bites</span>
          </div>
          <div class="bill-title">Official Digital Receipt</div>
        </div>
        <div class="zigzag"></div>

        <!-- BODY -->
        <div class="bill-body">
          <!-- ORDER ID -->
          <div class="order-id-row">
            <div class="order-id-label">Order ID</div>
            <div class="order-id-val">${order.orderId}</div>
            <div class="order-date-val">📅 ${dateStr} at ${timeStr}</div>
            <div style="margin-top:8px;">
              <span class="status-chip ${statusMap[order.status]||'status-confirmed'}">${order.status||'Confirmed'}</span>
            </div>
          </div>

          <!-- STUDENT INFO -->
          <div class="bill-student">
            <div class="bs-cell"><div class="bsk">Name</div><div class="bsv">${order.studentName||'—'}</div></div>
            <div class="bs-cell"><div class="bsk">Reg No.</div><div class="bsv">${order.regNo||'—'}</div></div>
            <div class="bs-cell"><div class="bsk">Department</div><div class="bsv">${order.department||'—'}</div></div>
            <div class="bs-cell"><div class="bsk">Items</div><div class="bsv">${totalQty} items</div></div>
          </div>

          <!-- ITEMS -->
          <div class="items-title">Items Ordered</div>
          <table class="items-table">
            <thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
            <tbody>
              ${order.items.map(i=>`
                <tr>
                  <td><div class="it-name">${i.emoji||''} ${i.name}</div></td>
                  <td>${i.qty}</td>
                  <td>₹${parseFloat(i.price).toFixed(2)}</td>
                  <td class="it-price">₹${(parseFloat(i.price)*i.qty).toFixed(2)}</td>
                </tr>`).join('')}
            </tbody>
          </table>

          <!-- TOTALS -->
          <div class="bill-totals">
            <div class="bt-row"><span>Subtotal</span><span>₹${parseFloat(order.subtotal).toFixed(2)}</span></div>
            <div class="bt-row"><span>GST (5%)</span><span>₹${parseFloat(order.gst).toFixed(2)}</span></div>
            <div class="bt-row"><span>Delivery</span><span style="color:var(--green)">FREE</span></div>
            <div class="bt-row grand"><span>Grand Total</span><span class="ba">₹${parseFloat(order.total).toFixed(2)}</span></div>
          </div>

          <!-- PAYMENT -->
          <div class="pay-info">
            <span style="font-size:1.3rem;">💳</span>
            <div>
              Paid via <strong>${order.paymentMethod||'—'}</strong> · Ref: <span style="font-family:monospace;color:var(--primary);">${order.paymentRef||'—'}</span>
            </div>
          </div>

          <!-- QR CODE -->
          <div class="qr-section">
            <div class="qr-label">Scan at Canteen Counter</div>
            <div class="qr-wrap">
              <canvas id="qrCanvas"></canvas>
            </div>
            <div class="qr-note">Show this QR code to collect your order</div>
          </div>
        </div>

        <!-- ACTIONS -->
        <div class="bill-actions">
          <button class="btn btn-primary" onclick="window.print()">🖨️ Print Bill</button>
          <a href="history.html" class="btn btn-secondary">📋 All Orders</a>
          <a href="menu.html" class="btn btn-outline">🍽️ Order Again</a>
        </div>

        <!-- FOOTER -->
        <div class="bill-footer">
          Campus Bites · Smart Canteen System<br>
          Thank you for your order! 🙏 Enjoy your meal.
        </div>
      </div>`;

    // Generate QR
    setTimeout(()=>{
      const canvas=document.getElementById('qrCanvas');
      if(canvas&&typeof QRCode!=='undefined'){
        QRCode.toCanvas(canvas,order.orderId+' | ₹'+parseFloat(order.total).toFixed(2)+' | '+order.studentName,{
          width:140,color:{dark:'#000000',light:'#ffffff'}
        },err=>{if(err)console.warn('QR error',err);});
      }
    },200);
  }

  function showToast(msg,type='info'){
    const c=document.getElementById('toastContainer');
    const t=document.createElement('div');
    t.className=`toast ${type}`;t.textContent=msg;
    c.appendChild(t);setTimeout(()=>t.remove(),3000);
  }
</script>
</body>
</html>
